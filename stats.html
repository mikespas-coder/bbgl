<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stats | Bogey's and Beers Golf League</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          'bills-blue':       '#00338D',
          'bills-blue-dark':  '#001E5C',
          'bills-blue-light': '#E6EBF4',
          'bills-red':        '#C60C30',
          'bills-red-dark':   '#8C0822',
          'bills-red-light':  '#FBE7EA',
        }
      }
    }
  };
</script>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="bg-stone-50 text-stone-900">
  <header id="app-header"></header>
  <main id="app-main" class="max-w-5xl mx-auto px-4 py-8">
    <p class="text-stone-500">Loading&hellip;</p>
  </main>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/scoring.js"></script>
  <script>
    (async function () {
      try {
        await DataStore.loadAll();
        UI.renderHeader('stats.html');

        const { playerStandings, weeks } = Scoring.computeSeason(
          DataStore.teams, DataStore.scoresByWeek, DataStore.scorecard
        );
        const main = document.getElementById('app-main');
        const weeksPlayed = Object.keys(weeks).length;

        if (weeksPlayed === 0) {
          main.innerHTML = `
            <h2 class="text-2xl font-bold text-stone-800 mb-2">Stats &amp; Accolades</h2>
            <div class="bg-amber-50 border border-amber-200 rounded-lg p-6 text-amber-900">
              <p class="font-semibold mb-1">No rounds played yet.</p>
              <p class="text-sm">Once Brian enters scores for week 1, this page will fill in.</p>
            </div>
          `;
          return;
        }

        function topBy(field, n = 5) {
          return [...playerStandings].filter(p => p.weeksPlayed > 0).sort((a, b) => (b[field]||0) - (a[field]||0)).slice(0, n);
        }

        function statCard(title, list, statField) {
          return `
            <div class="bg-white rounded-lg shadow-sm border border-stone-200 p-4">
              <h3 class="font-bold text-stone-800 mb-2">${title}</h3>
              <ol class="space-y-1 text-sm">
                ${list.map((p, i) => `
                  <li class="flex justify-between">
                    <span><span class="text-stone-400 mr-2">${i+1}.</span>${p.name}${p.isSub ? ' <span class="text-xs text-stone-400">(sub)</span>' : ''}</span>
                    <span class="font-semibold">${UI.formatPoints(p[statField]||0)}</span>
                  </li>
                `).join('')}
              </ol>
            </div>
          `;
        }

        main.innerHTML = `
          <h2 class="text-2xl font-bold text-stone-800 mb-1">Stats &amp; Accolades</h2>
          <p class="text-stone-500 text-sm mb-6">${weeksPlayed} ${weeksPlayed === 1 ? 'week' : 'weeks'} of data so far</p>

          <div class="grid sm:grid-cols-2 gap-4">
            ${statCard('Season Points Leader', topBy('totalPoints', 5), 'totalPoints')}
            ${statCard('Most Birdies', topBy('birdies', 5), 'birdies')}
            ${statCard('Most Pars', topBy('pars', 5), 'pars')}
            ${statCard('Most Weeks Played', topBy('weeksPlayed', 5), 'weeksPlayed')}
            ${statCard('Eagles', topBy('eagles', 5), 'eagles')}
            ${statCard('Hole-in-Ones', topBy('holeInOnes', 5), 'holeInOnes')}
          </div>
        `;
      } catch (e) {
        console.error(e);
        UI.showError('Failed to load stats: ' + e.message);
      }
    })();
  </script>
</body>
</html>
