<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Score Entry | Bogey's and Beers Golf League</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          'bills-blue':       '#00338D',
          'bills-blue-dark':  '#001E5C',
          'bills-blue-light': '#E6EBF4',
          'bills-red':        '#C60C30',
          'bills-red-dark':   '#8C0822',
          'bills-red-light':  '#FBE7EA',
        }
      }
    }
  };
</script>
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    .hole-input { width: 3.25rem; }
    .hole-input::-webkit-outer-spin-button,
    .hole-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .hole-input { -moz-appearance: textfield; }
  </style>
</head>
<body class="bg-stone-50 text-stone-900">
  <!-- Password gate. Cosmetic only - password is visible in page source. -->
  <div id="pw-gate" class="hidden min-h-screen flex items-center justify-center px-4">
    <div class="bg-white rounded-lg shadow-md border border-stone-200 p-6 max-w-sm w-full">
      <h2 class="text-xl font-bold text-stone-800 mb-1">Score Entry</h2>
      <p class="text-stone-500 text-sm mb-4">For Brian &amp; co-commissioners. Enter the league password.</p>
      <form id="pw-form" class="space-y-3">
        <input type="password" id="pw-input" autocomplete="off" autofocus
          class="w-full border border-stone-300 rounded px-3 py-2"
          placeholder="Password" />
        <label class="flex items-center gap-2 text-sm text-stone-600">
          <input type="checkbox" id="pw-remember" checked />
          Remember me on this device
        </label>
        <button type="submit" class="w-full bg-bills-red hover:bg-bills-red-dark text-white font-semibold px-4 py-2 rounded">
          Unlock
        </button>
        <p id="pw-error" class="text-sm text-red-600 hidden">Wrong password.</p>
      </form>
    </div>
  </div>

  <div id="protected" class="hidden">
    <header id="app-header"></header>
    <main id="app-main" class="max-w-6xl mx-auto px-4 py-6">
      <p class="text-stone-500">Loading&hellip;</p>
    </main>
  </div>

  <script>
    // Cosmetic password gate. The password lives in client-side JS - this is
    // obscurity, not security. Real auth is the GitHub repo collaborator list.
    (function () {
      const PASSWORD = 'bbgl2026';
      const KEY = 'bbgl-entry-unlocked-v1';

      function reveal() {
        document.getElementById('pw-gate').classList.add('hidden');
        document.getElementById('protected').classList.remove('hidden');
        // runApp is defined in a script tag further down the page. If we got
        // here before that script has parsed (e.g. auto-unlock via stored
        // password), wait for window 'load' before invoking it.
        if (typeof runApp === 'function') {
          runApp();
        } else {
          window.addEventListener('load', () => runApp());
        }
      }

      if (sessionStorage.getItem(KEY) === '1' || localStorage.getItem(KEY) === '1') {
        reveal();
        return;
      }

      document.getElementById('pw-gate').classList.remove('hidden');
      const form = document.getElementById('pw-form');
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const val = document.getElementById('pw-input').value;
        if (val === PASSWORD) {
          const remember = document.getElementById('pw-remember').checked;
          (remember ? localStorage : sessionStorage).setItem(KEY, '1');
          reveal();
        } else {
          document.getElementById('pw-error').classList.remove('hidden');
          document.getElementById('pw-input').value = '';
        }
      });
    })();
  </script>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/scoring.js"></script>
  <script>
    async function runApp() {
      try {
        await DataStore.loadAll();
        UI.renderHeader('score-entry.html');

        const main = document.getElementById('app-main');
        main.innerHTML = `
          <h2 class="text-2xl font-bold text-stone-800 mb-1">Score Entry</h2>
          <p class="text-stone-600 text-sm mb-5">
            Pick a week, enter each player's 9-hole gross scores, hit Generate, then copy the JSON into
            <code class="bg-stone-100 px-1">data/scores/week-N.json</code>, add that week number to
            <code class="bg-stone-100 px-1">data/manifest.json</code>, and push.
          </p>

          <div class="bg-white rounded-lg shadow-sm border border-stone-200 p-4 mb-5 flex flex-col sm:flex-row sm:items-end gap-3">
            <div class="flex-1">
              <label class="block text-sm font-semibold text-stone-700 mb-1">Week</label>
              <select id="weekPicker" class="w-full border border-stone-300 rounded px-3 py-2">
                ${DataStore.schedule.map(wk =>
                  `<option value="${wk.week}">Week ${wk.week} &mdash; ${UI.formatDate(wk.date)} &mdash; ${wk.nine === 'back' ? 'Back 9' : 'Front 9'}</option>`
                ).join('')}
              </select>
            </div>
            <div class="flex-1">
              <label class="block text-sm font-semibold text-stone-700 mb-1">Nine played (override)</label>
              <select id="ninePicker" class="w-full border border-stone-300 rounded px-3 py-2">
                <option value="front">Front 9</option>
                <option value="back">Back 9</option>
              </select>
            </div>
          </div>

          <div id="matchesArea" class="space-y-4 mb-6"></div>

          <div class="flex flex-wrap gap-3 mb-6">
            <button id="generateBtn" class="bg-bills-red hover:bg-bills-red-dark text-white font-semibold px-4 py-2 rounded">Generate JSON &amp; Preview</button>
            <button id="copyBtn" class="bg-stone-200 hover:bg-stone-300 text-stone-800 font-semibold px-4 py-2 rounded hidden">Copy JSON</button>
          </div>

          <div id="output" class="hidden">
            <h3 class="font-bold text-stone-800 mb-2">Generated JSON</h3>
            <p class="text-sm text-stone-600 mb-2">
              Save this as <code id="outputFilename" class="bg-stone-100 px-1"></code>.
            </p>
            <textarea id="jsonOutput" class="w-full h-72 font-mono text-xs border border-stone-300 rounded p-3 bg-stone-50"></textarea>
            <div id="livePreview" class="mt-6"></div>
          </div>
        `;

        const weekPicker = document.getElementById('weekPicker');
        const ninePicker = document.getElementById('ninePicker');
        const matchesArea = document.getElementById('matchesArea');
        const generateBtn = document.getElementById('generateBtn');
        const copyBtn = document.getElementById('copyBtn');
        const output = document.getElementById('output');
        const jsonOutput = document.getElementById('jsonOutput');
        const outputFilename = document.getElementById('outputFilename');
        const livePreview = document.getElementById('livePreview');

        function holeHeadersFor(nine) {
          const startIdx = nine === 'back' ? 9 : 0;
          return DataStore.scorecard.holes.slice(startIdx, startIdx + 9);
        }

        function playerRow(rowKey, teamId, player, holes, handicap, holeScores, isSub, subName) {
          const holesCells = holes.map((h, i) => `
            <td class="px-1 py-1 text-center">
              <input type="number" min="1" max="15" value="${holeScores && holeScores[i] != null ? holeScores[i] : ''}"
                class="hole-input border border-stone-300 rounded px-1 py-1 text-center text-sm" data-hole="${i}" />
              <div class="text-[10px] text-stone-400">P${h.par}/HCP${h.hcpIndex}</div>
            </td>
          `).join('');
          const playerCell = isSub
            ? `<input type="text" value="${subName || ''}" placeholder="Sub name" data-sub-name class="border border-stone-300 rounded px-2 py-1 text-sm w-32" />`
            : `<span class="font-semibold">${player.nickname || player.name}</span><div class="text-[11px] text-stone-500">${player.name}</div>`;
          return `
            <tr class="border-t border-stone-100" data-row="${rowKey}" data-team="${teamId}" data-player="${player ? player.id : ''}" data-is-sub="${isSub ? '1' : '0'}">
              <td class="px-2 py-1 text-sm align-top">${playerCell}</td>
              <td class="px-2 py-1 align-top">
                <input type="number" min="0" max="40" value="${handicap != null ? handicap : (player ? player.handicap : '')}" data-hcp class="border border-stone-300 rounded px-2 py-1 text-sm w-16 text-center" />
              </td>
              ${holesCells}
              <td class="px-2 py-1 text-right text-sm font-semibold text-stone-600 align-top">
                <span data-row-total>&mdash;</span>
              </td>
              <td class="px-2 py-1 align-top">
                <button type="button" data-remove class="text-xs text-stone-400 hover:text-red-600">&times;</button>
              </td>
            </tr>
          `;
        }

        function renderMatches() {
          const w = Number(weekPicker.value);
          const wk = DataStore.schedule.find(s => s.week === w);
          if (!wk) { matchesArea.innerHTML = ''; return; }
          ninePicker.value = wk.nine || 'front';
          const existing = DataStore.scoresByWeek[w];
          const nine = ninePicker.value;
          const holes = holeHeadersFor(nine);

          // Live handicap = rolling avg of rounds BEFORE this week, fallback to teams.json
          // if there's no history yet.
          function liveHcp(playerId, fallback) {
            const computed = Scoring.computeHandicap(playerId, DataStore.scoresByWeek, DataStore.scorecard, w);
            const rounds = Scoring.collectPlayerRounds(playerId, DataStore.scoresByWeek, DataStore.scorecard, w).length;
            return rounds > 0 ? computed : (fallback != null ? fallback : 0);
          }

          const headerRow = `
            <tr class="bg-stone-100 text-xs text-stone-600">
              <th class="px-2 py-2 text-left">Player</th>
              <th class="px-2 py-2 text-center" title="9-hole handicap (auto from rolling avg of past rounds, override if needed)">9h HCP</th>
              ${holes.map(h => `<th class="px-1 py-2 text-center">${h.hole}</th>`).join('')}
              <th class="px-2 py-2 text-right">Pts</th>
              <th class="px-1 py-2"></th>
            </tr>
          `;

          matchesArea.innerHTML = wk.matches.map((m, mi) => {
            const tA = DataStore.teamById(m.teamA);
            const tB = DataStore.teamById(m.teamB);
            const exMatch = existing ? existing.matches[mi] : null;

            const partsA = (exMatch ? exMatch.participants : []).filter(p => p.teamId === m.teamA);
            const partsB = (exMatch ? exMatch.participants : []).filter(p => p.teamId === m.teamB);

            const aRows = tA.players.map(p => {
              const ex = partsA.find(x => x.playerId === p.id && !x.isSub);
              const hcp = ex ? ex.handicap : liveHcp(p.id, p.handicap);
              return playerRow(`a-${p.id}`, m.teamA, p, holes, hcp, ex ? ex.holes : null, false, null);
            }).join('') + partsA.filter(x => x.isSub).map((sub, si) =>
              playerRow(`a-sub-${si}`, m.teamA, { id: sub.playerId }, holes, sub.handicap, sub.holes, true, sub.subName)
            ).join('');

            const bRows = tB.players.map(p => {
              const ex = partsB.find(x => x.playerId === p.id && !x.isSub);
              const hcp = ex ? ex.handicap : liveHcp(p.id, p.handicap);
              return playerRow(`b-${p.id}`, m.teamB, p, holes, hcp, ex ? ex.holes : null, false, null);
            }).join('') + partsB.filter(x => x.isSub).map((sub, si) =>
              playerRow(`b-sub-${si}`, m.teamB, { id: sub.playerId }, holes, sub.handicap, sub.holes, true, sub.subName)
            ).join('');

            return `
              <div class="bg-white rounded-lg shadow-sm border border-stone-200 p-3 overflow-x-auto" data-match="${mi}" data-team-a="${m.teamA}" data-team-b="${m.teamB}">
                <h3 class="font-bold text-stone-800 mb-2">${tA.name} <span class="text-stone-400">vs</span> ${tB.name}</h3>
                <table class="min-w-full text-sm" data-section="A">
                  <thead>${headerRow}</thead>
                  <tbody>${aRows}</tbody>
                </table>
                <div class="my-2">
                  <button type="button" data-add-sub="A" class="text-xs text-bills-red hover:underline">+ Add sub for ${tA.name}</button>
                </div>
                <table class="min-w-full text-sm" data-section="B">
                  <thead>${headerRow}</thead>
                  <tbody>${bRows}</tbody>
                </table>
                <div class="my-2">
                  <button type="button" data-add-sub="B" class="text-xs text-bills-red hover:underline">+ Add sub for ${tB.name}</button>
                </div>
              </div>
            `;
          }).join('');

          attachHandlers();
        }

        function attachHandlers() {
          matchesArea.querySelectorAll('input').forEach(inp => {
            inp.addEventListener('input', recomputeRowTotals);
          });
          matchesArea.querySelectorAll('[data-remove]').forEach(btn => {
            btn.addEventListener('click', () => {
              const row = btn.closest('tr');
              if (row.dataset.isSub === '1') {
                row.remove();
                recomputeRowTotals();
              } else {
                // Regular player: clear inputs instead of removing
                row.querySelectorAll('input').forEach(i => { i.value = ''; });
                recomputeRowTotals();
              }
            });
          });
          matchesArea.querySelectorAll('[data-add-sub]').forEach(btn => {
            btn.addEventListener('click', () => {
              const matchEl = btn.closest('[data-match]');
              const which = btn.dataset.addSub;
              const teamId = which === 'A' ? matchEl.dataset.teamA : matchEl.dataset.teamB;
              const tbody = matchEl.querySelector(`table[data-section="${which}"] tbody`);
              const subId = `sub-${Date.now()}`;
              const holes = holeHeadersFor(ninePicker.value);
              tbody.insertAdjacentHTML('beforeend', playerRow(subId, teamId, { id: subId }, holes, '', null, true, ''));
              attachHandlers();
            });
          });
          recomputeRowTotals();
        }

        function recomputeRowTotals() {
          const nine = ninePicker.value;
          matchesArea.querySelectorAll('tr[data-row]').forEach(row => {
            const hcp = Number(row.querySelector('[data-hcp]').value) || 0;
            const holes = Array.from(row.querySelectorAll('[data-hole]')).map(i => i.value === '' ? null : Number(i.value));
            const r = Scoring.pointsForRound(holes, hcp, nine, DataStore.scorecard);
            const cell = row.querySelector('[data-row-total]');
            if (r.holesPlayed === 0) cell.textContent = '—';
            else cell.textContent = UI.formatPoints(r.total) + ` (+1)`;
          });
        }

        weekPicker.addEventListener('change', renderMatches);
        ninePicker.addEventListener('change', renderMatches);
        renderMatches();

        function buildJson() {
          const w = Number(weekPicker.value);
          const wk = DataStore.schedule.find(s => s.week === w);
          const nine = ninePicker.value;

          const matches = Array.from(matchesArea.querySelectorAll('[data-match]')).map(matchEl => {
            const teamA = matchEl.dataset.teamA;
            const teamB = matchEl.dataset.teamB;
            const rows = Array.from(matchEl.querySelectorAll('tr[data-row]'));
            const participants = [];
            rows.forEach(row => {
              const hcp = Number(row.querySelector('[data-hcp]').value) || 0;
              const holes = Array.from(row.querySelectorAll('[data-hole]')).map(i => i.value === '' ? null : Number(i.value));
              const played = holes.some(h => h != null && h > 0);
              if (!played) return; // skip no-shows
              const teamId = row.dataset.team;
              const isSub = row.dataset.isSub === '1';
              let playerId, subName = null;
              if (isSub) {
                const sn = (row.querySelector('[data-sub-name]')?.value || '').trim();
                subName = sn || 'Sub';
                playerId = 'sub-' + (subName.toLowerCase().replace(/[^a-z0-9]+/g, '-') || Date.now());
              } else {
                playerId = row.dataset.player;
              }
              participants.push({
                teamId, playerId, isSub, subName,
                handicap: hcp, holes,
              });
            });
            return { teamA, teamB, participants };
          });

          return { week: w, date: wk.date, nine, matches };
        }

        generateBtn.addEventListener('click', () => {
          const data = buildJson();
          jsonOutput.value = JSON.stringify(data, null, 2);
          outputFilename.textContent = `data/scores/week-${data.week}.json`;
          output.classList.remove('hidden');
          copyBtn.classList.remove('hidden');

          const preview = data.matches.map(m => Scoring.scoreMatch({ ...m, nine: data.nine }, DataStore.scorecard));
          livePreview.innerHTML = `
            <h3 class="font-bold text-stone-800 mb-2">Preview</h3>
            <div class="grid gap-3 sm:grid-cols-2">
              ${preview.map(p => {
                const tA = DataStore.teamById(p.teamA);
                const tB = DataStore.teamById(p.teamB);
                return `
                  <div class="bg-bills-red-light border border-bills-red rounded p-3 text-sm">
                    <div class="flex justify-between"><span>${tA.name}</span><span><span class="text-stone-500 text-xs mr-1">${UI.formatPoints(p.teamATotal)} ind</span><span class="font-bold">${UI.formatPoints(p.teamAPoints)} pts</span></span></div>
                    <div class="flex justify-between"><span>${tB.name}</span><span><span class="text-stone-500 text-xs mr-1">${UI.formatPoints(p.teamBTotal)} ind</span><span class="font-bold">${UI.formatPoints(p.teamBPoints)} pts</span></span></div>
                  </div>
                `;
              }).join('')}
            </div>
          `;
        });

        copyBtn.addEventListener('click', async () => {
          await navigator.clipboard.writeText(jsonOutput.value);
          copyBtn.textContent = 'Copied!';
          setTimeout(() => copyBtn.textContent = 'Copy JSON', 1500);
        });
      } catch (e) {
        console.error(e);
        UI.showError('Failed to load score entry: ' + e.message);
      }
    }
  </script>
</body>
</html>
