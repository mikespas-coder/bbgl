<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stats | Bogey's and Beers Golf League</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="bg-stone-50 text-stone-900">
  <header id="app-header"></header>
  <main id="app-main" class="max-w-5xl mx-auto px-4 py-8">
    <p class="text-stone-500">Loading stats&hellip;</p>
  </main>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/scoring.js"></script>
  <script>
    (async function () {
      try {
        await DataStore.loadAll();
        UI.renderHeader('stats.html');

        const stats = Scoring.computePlayerStats(DataStore.teams, DataStore.scoresByWeek)
          .filter(s => s.rounds > 0);

        const main = document.getElementById('app-main');

        if (stats.length === 0) {
          main.innerHTML = `
            <h2 class="text-2xl font-bold text-stone-800 mb-2">Stats</h2>
            <p class="text-stone-500">Stats will populate once weekly scores are entered.</p>
          `;
          return;
        }

        const lowGross = [...stats].sort((a,b) => a.lowGross - b.lowGross).slice(0, 5);
        const lowNet   = [...stats].sort((a,b) => a.lowNet   - b.lowNet  ).slice(0, 5);
        const mostMatchPlayWins = [...stats].sort((a,b) => b.matchPlayWins - a.matchPlayWins).slice(0, 5);
        const avgNet = [...stats].sort((a,b) => (a.totalNet/a.rounds) - (b.totalNet/b.rounds));

        const renderList = (rows, valueFn, valueLabel) => `
          <div class="bg-white rounded-lg shadow-sm border border-stone-200 p-4">
            <h3 class="font-bold text-stone-800 mb-3">${valueLabel}</h3>
            <ol class="space-y-2 text-sm">
              ${rows.map((s, i) => `
                <li class="flex justify-between">
                  <span><span class="text-stone-400 mr-2">${i+1}.</span>${s.name} <span class="text-stone-400 text-xs">(${s.teamName})</span></span>
                  <span class="font-semibold">${valueFn(s)}</span>
                </li>
              `).join('')}
            </ol>
          </div>
        `;

        main.innerHTML = `
          <h2 class="text-2xl font-bold text-stone-800 mb-6">Season Stats</h2>
          <div class="grid gap-4 md:grid-cols-2 mb-8">
            ${renderList(lowGross, s => s.lowGross, 'Low Gross Round')}
            ${renderList(lowNet,   s => s.lowNet,   'Low Net Round')}
            ${renderList(mostMatchPlayWins, s => s.matchPlayWins, 'Match Play Wins')}
            ${renderList(avgNet, s => (s.totalNet/s.rounds).toFixed(1), 'Best Avg Net')}
          </div>

          <h3 class="text-xl font-bold text-stone-800 mb-3">All Players</h3>
          <div class="overflow-x-auto bg-white rounded-lg shadow-sm border border-stone-200">
            <table class="w-full text-sm">
              <thead class="bg-stone-100 text-stone-600">
                <tr>
                  <th class="text-left px-3 py-2">Player</th>
                  <th class="text-left px-3 py-2">Team</th>
                  <th class="text-right px-3 py-2">Rounds</th>
                  <th class="text-right px-3 py-2">Avg Gross</th>
                  <th class="text-right px-3 py-2">Avg Net</th>
                  <th class="text-right px-3 py-2">MP W&ndash;L&ndash;H</th>
                  <th class="text-right px-3 py-2">SP W&ndash;L&ndash;H</th>
                </tr>
              </thead>
              <tbody>
                ${stats.map(s => `
                  <tr class="standings-row border-t border-stone-100">
                    <td class="px-3 py-2 font-semibold">${s.name}</td>
                    <td class="px-3 py-2 text-stone-600">${s.teamName}</td>
                    <td class="px-3 py-2 text-right">${s.rounds}</td>
                    <td class="px-3 py-2 text-right">${(s.totalGross/s.rounds).toFixed(1)}</td>
                    <td class="px-3 py-2 text-right">${(s.totalNet/s.rounds).toFixed(1)}</td>
                    <td class="px-3 py-2 text-right">${s.matchPlayWins}&ndash;${s.matchPlayLosses}&ndash;${s.matchPlayHalves}</td>
                    <td class="px-3 py-2 text-right">${s.strokePlayWins}&ndash;${s.strokePlayLosses}&ndash;${s.strokePlayHalves}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `;
      } catch (e) {
        console.error(e);
        UI.showError('Failed to load stats: ' + e.message);
      }
    })();
  </script>
</body>
</html>
