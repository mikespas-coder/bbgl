<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teams | Bogey's and Beers Golf League</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          'bills-blue':       '#00338D',
          'bills-blue-dark':  '#001E5C',
          'bills-blue-light': '#E6EBF4',
          'bills-red':        '#C60C30',
          'bills-red-dark':   '#8C0822',
          'bills-red-light':  '#FBE7EA',
        }
      }
    }
  };
</script>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="bg-stone-50 text-stone-900">
  <header id="app-header"></header>
  <main id="app-main" class="max-w-5xl mx-auto px-4 py-8">
    <p class="text-stone-500">Loading teams&hellip;</p>
  </main>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/scoring.js"></script>
  <script>
    (async function () {
      try {
        await DataStore.loadAll();
        UI.renderHeader('teams.html');

        // Compute current live handicaps (rolling avg of all rounds).
        const live = Scoring.computeAllHandicaps(DataStore.teams, DataStore.scoresByWeek, DataStore.scorecard);

        const main = document.getElementById('app-main');
        main.innerHTML = `
          <h2 class="text-2xl font-bold text-stone-800 mb-1">Teams</h2>
          <p class="text-stone-500 text-sm mb-6">
            ${DataStore.teams.length} teams competing this season &middot;
            handicaps shown are live (rolling average of rounds played so far).
          </p>
          <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
            ${DataStore.teams.map(team => `
              <div class="player-card bg-white rounded-lg shadow-sm border border-stone-200 p-5">
                <h3 class="text-lg font-bold text-bills-blue">${team.name}</h3>
                ${team.tagline ? `<p class="text-xs text-stone-500 mb-3">${team.tagline}</p>` : '<div class="mb-3"></div>'}
                <ul class="space-y-2">
                  ${team.players.map(p => {
                    const h = live[p.id] || { current: p.handicap || 0, roundsPlayed: 0 };
                    const label = h.roundsPlayed > 0
                      ? `9h HCP ${h.current}`
                      : `9h HCP &mdash;`;
                    const title = h.roundsPlayed > 0
                      ? `Based on ${h.roundsPlayed} round${h.roundsPlayed === 1 ? '' : 's'}`
                      : 'No rounds played yet';
                    return `
                      <li class="flex justify-between items-center">
                        <span class="text-stone-800">
                          ${p.nickname && p.nickname !== p.name ? `<span class="font-semibold">${p.nickname}</span> <span class="text-stone-500 text-xs">(${p.name})</span>` : p.name}
                        </span>
                        <span class="text-xs text-stone-500 bg-stone-100 px-2 py-1 rounded" title="${title}">${label}</span>
                      </li>
                    `;
                  }).join('')}
                </ul>
              </div>
            `).join('')}
          </div>
        `;
      } catch (e) {
        console.error(e);
        UI.showError('Failed to load teams: ' + e.message);
      }
    })();
  </script>
</body>
</html>
