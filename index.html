<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaderboard | Bogey's and Beers Golf League</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="bg-stone-50 text-stone-900">
  <header id="app-header"></header>
  <main id="app-main" class="max-w-5xl mx-auto px-4 py-8">
    <p class="text-stone-500">Loading league data&hellip;</p>
  </main>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/scoring.js"></script>
  <script>
    (async function () {
      try {
        await DataStore.loadAll();
        UI.renderHeader('index.html');

        const { playerStandings, teamStandings, weeks } = Scoring.computeSeason(
          DataStore.teams, DataStore.scoresByWeek, DataStore.scorecard
        );
        const weeksPlayed = Object.keys(weeks).length;
        const lastWeek = weeksPlayed > 0 ? Math.max(...Object.keys(weeks).map(Number)) : null;

        const main = document.getElementById('app-main');
        main.innerHTML = `
          <section class="mb-8">
            <h2 class="text-2xl font-bold text-stone-800 mb-1">Team Standings</h2>
            <p class="text-stone-500 text-sm mb-4">3 team points per week &middot; playoff seeding based on team totals</p>
            <div class="overflow-x-auto bg-white rounded-lg shadow-sm border border-stone-200">
              <table class="w-full text-sm">
                <thead class="bg-stone-100 text-stone-600">
                  <tr>
                    <th class="text-left px-3 py-2 w-10">#</th>
                    <th class="text-left px-3 py-2">Team</th>
                    <th class="text-right px-3 py-2">Played</th>
                    <th class="text-right px-3 py-2">W&ndash;L&ndash;T</th>
                    <th class="text-right px-3 py-2 font-bold">Team Pts</th>
                  </tr>
                </thead>
                <tbody>
                  ${teamStandings.map((t, i) => {
                    const lead = i === 0 && t.teamPoints > 0;
                    return `
                      <tr class="border-t border-stone-100">
                        <td class="px-3 py-2 ${lead ? 'text-emerald-700 font-bold' : 'text-stone-500'}">${i + 1}</td>
                        <td class="px-3 py-2 ${lead ? 'font-bold text-emerald-700' : 'font-semibold'}">${t.teamName}</td>
                        <td class="px-3 py-2 text-right text-stone-600">${t.matchesPlayed}</td>
                        <td class="px-3 py-2 text-right text-stone-600">${t.wins}&ndash;${t.losses}&ndash;${t.ties}</td>
                        <td class="px-3 py-2 text-right font-bold ${lead ? 'text-emerald-700' : 'text-stone-800'}">${UI.formatPoints(t.teamPoints)}</td>
                      </tr>
                    `;
                  }).join('')}
                </tbody>
              </table>
            </div>
          </section>

          <section class="mb-8">
            <h2 class="text-2xl font-bold text-stone-800 mb-1">Individual Standings</h2>
            <p class="text-stone-500 text-sm mb-4">
              ${weeksPlayed} ${weeksPlayed === 1 ? 'week' : 'weeks'} played &middot; hole points + show-up bonus + team-point share
            </p>
            <div class="overflow-x-auto bg-white rounded-lg shadow-sm border border-stone-200">
              <table class="w-full text-sm">
                <thead class="bg-stone-100 text-stone-600">
                  <tr>
                    <th class="text-left px-3 py-2 w-10">#</th>
                    <th class="text-left px-3 py-2">Player</th>
                    <th class="text-left px-3 py-2">Team</th>
                    <th class="text-right px-3 py-2">Wks</th>
                    <th class="text-right px-3 py-2">Hole</th>
                    <th class="text-right px-3 py-2">Bonus</th>
                    <th class="text-right px-3 py-2">Team</th>
                    <th class="text-right px-3 py-2 font-bold">Total</th>
                  </tr>
                </thead>
                <tbody>
                  ${playerStandings.map((p, i) => {
                    const lead = i === 0 && p.totalPoints > 0;
                    return `
                      <tr class="border-t border-stone-100">
                        <td class="px-3 py-2 ${lead ? 'text-emerald-700 font-bold' : 'text-stone-500'}">${i + 1}</td>
                        <td class="px-3 py-2 ${lead ? 'font-bold text-emerald-700' : 'font-semibold'}">${p.name}${p.isSub ? ' <span class="text-xs text-stone-400">(sub)</span>' : ''}</td>
                        <td class="px-3 py-2 text-stone-600 text-xs">${p.teamName}</td>
                        <td class="px-3 py-2 text-right text-stone-600">${p.weeksPlayed}</td>
                        <td class="px-3 py-2 text-right text-stone-600">${UI.formatPoints(p.holePoints)}</td>
                        <td class="px-3 py-2 text-right text-stone-600">${UI.formatPoints(p.showupBonus)}</td>
                        <td class="px-3 py-2 text-right text-stone-600">${UI.formatPoints(p.teamPointsShare)}</td>
                        <td class="px-3 py-2 text-right font-bold ${lead ? 'text-emerald-700' : 'text-stone-800'}">${UI.formatPoints(p.totalPoints)}</td>
                      </tr>
                    `;
                  }).join('')}
                </tbody>
              </table>
            </div>
          </section>

          ${lastWeek ? `
            <section class="mb-8">
              <h2 class="text-2xl font-bold text-stone-800 mb-1">Week ${lastWeek} Results</h2>
              <p class="text-stone-500 text-sm mb-4">${UI.formatDate(weeks[lastWeek].date)} &middot; ${weeks[lastWeek].nine === 'back' ? 'Back 9' : 'Front 9'}</p>
              <div class="grid gap-4 sm:grid-cols-2">
                ${weeks[lastWeek].matches.map(m => {
                  const tA = DataStore.teamById(m.teamA);
                  const tB = DataStore.teamById(m.teamB);
                  const aWin = m.teamAPoints > m.teamBPoints;
                  const bWin = m.teamBPoints > m.teamAPoints;
                  return `
                    <div class="bg-white rounded-lg shadow-sm border border-stone-200 p-4">
                      <div class="flex items-center justify-between">
                        <div class="${aWin ? 'font-bold text-emerald-700' : 'text-stone-700'}">${tA.name}</div>
                        <div class="text-right">
                          <div class="text-xs text-stone-500">${UI.formatPoints(m.teamATotal)} ind</div>
                          <div class="text-xl font-bold">${UI.formatPoints(m.teamAPoints)}</div>
                        </div>
                      </div>
                      <div class="border-t border-stone-100 my-2"></div>
                      <div class="flex items-center justify-between">
                        <div class="${bWin ? 'font-bold text-emerald-700' : 'text-stone-700'}">${tB.name}</div>
                        <div class="text-right">
                          <div class="text-xs text-stone-500">${UI.formatPoints(m.teamBTotal)} ind</div>
                          <div class="text-xl font-bold">${UI.formatPoints(m.teamBPoints)}</div>
                        </div>
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>
            </section>
          ` : `
            <section class="bg-amber-50 border border-amber-200 rounded-lg p-6 text-amber-900">
              <p class="font-semibold mb-1">No scores entered yet.</p>
              <p class="text-sm">Season starts Friday May 22. Head to <a class="underline" href="score-entry.html">Score Entry</a> after the first round to log results.</p>
            </section>
          `}
        `;
      } catch (e) {
        console.error(e);
        UI.showError('Failed to load league data: ' + e.message);
      }
    })();
  </script>
</body>
</html>
