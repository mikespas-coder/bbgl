<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule | Bogey's and Beers Golf League</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="bg-stone-50 text-stone-900">
  <header id="app-header"></header>
  <main id="app-main" class="max-w-5xl mx-auto px-4 py-8">
    <p class="text-stone-500">Loading schedule&hellip;</p>
  </main>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/scoring.js"></script>
  <script>
    (async function () {
      try {
        await DataStore.loadAll();
        UI.renderHeader('schedule.html');

        const main = document.getElementById('app-main');
        const today = new Date().toISOString().slice(0,10);

        main.innerHTML = `
          <h2 class="text-2xl font-bold text-stone-800 mb-6">Schedule</h2>
          <div class="space-y-4">
            ${DataStore.schedule.map(wk => {
              const played = DataStore.scoresByWeek[wk.week] != null;
              const upcoming = !played && wk.date >= today;
              return `
                <div class="bg-white rounded-lg shadow-sm border ${upcoming ? 'border-emerald-300' : 'border-stone-200'} overflow-hidden">
                  <div class="${played ? 'bg-stone-100' : upcoming ? 'bg-emerald-50' : 'bg-stone-50'} px-4 py-3 flex items-center justify-between">
                    <div>
                      <span class="font-bold text-stone-800">Week ${wk.week}</span>
                      <span class="text-stone-500 ml-3 text-sm">${UI.formatDate(wk.date)}</span>
                    </div>
                    <span class="text-xs px-2 py-1 rounded ${played ? 'bg-stone-300 text-stone-700' : upcoming ? 'bg-emerald-600 text-white' : 'bg-stone-200 text-stone-600'}">
                      ${played ? 'Final' : upcoming ? 'Upcoming' : 'Scheduled'}
                    </span>
                  </div>
                  <ul class="divide-y divide-stone-100">
                    ${wk.matches.map(m => {
                      const tA = DataStore.teamById(m.teamA);
                      const tB = DataStore.teamById(m.teamB);
                      return `
                        <li class="px-4 py-2 flex justify-between text-sm">
                          <span>${tA.name} <span class="text-stone-400">vs</span> ${tB.name}</span>
                        </li>
                      `;
                    }).join('')}
                  </ul>
                </div>
              `;
            }).join('')}
          </div>
        `;
      } catch (e) {
        console.error(e);
        UI.showError('Failed to load schedule: ' + e.message);
      }
    })();
  </script>
</body>
</html>
